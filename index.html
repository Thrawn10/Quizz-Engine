<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Literatur-Quiz</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f0f2f5;
      --surface:     #ffffff;
      --surface-alt: #f8f9fb;
      --border:      #e2e5ea;
      --text:        #1a1d23;
      --text-muted:  #6b7280;
      --accent:      #2563eb;
      --accent-hover:#1d4ed8;
      --accent-light:#dbeafe;
      --success:     #16a34a;
      --success-bg:  #dcfce7;
      --success-border:#86efac;
      --danger:      #dc2626;
      --danger-bg:   #fee2e2;
      --danger-border:#fca5a5;
      --warning:     #d97706;
      --warning-bg:  #fef3c7;
      --radius:      12px;
      --radius-sm:   6px;
      --shadow:      0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
      --shadow-card: 0 2px 8px rgba(0,0,0,.1), 0 8px 32px rgba(0,0,0,.08);
      --transition:  0.18s ease;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Typography ───────────────────────────────────────────── */
    h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.02em; }
    h2 { font-size: 1.3rem;  font-weight: 600; letter-spacing: -0.01em; }
    h3 { font-size: 1rem;    font-weight: 600; }
    p  { line-height: 1.6; }

    /* ── Layout wrapper ───────────────────────────────────────── */
    .app {
      width: 100%;
      max-width: 780px;
      padding: 24px 16px 60px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── Header ───────────────────────────────────────────────── */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
      max-width: 100vw;
    }

    .site-header .logo {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.01em;
    }

    .site-header .logo span {
      color: var(--text-muted);
      font-weight: 400;
    }

    .header-home-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 14px;
      font-size: 0.85rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
    }
    .header-home-btn:hover {
      background: var(--accent-light);
      color: var(--accent);
      border-color: var(--accent);
    }

    /* ── Card ─────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow);
    }

    /* ── Buttons ──────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 22px;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      border: 1.5px solid transparent;
      font-family: var(--font);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); border-color: var(--accent-hover); }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border-color: var(--border);
    }
    .btn-secondary:hover:not(:disabled) { background: var(--surface-alt); border-color: #c5ccd6; }

    .btn-success {
      background: var(--success);
      color: #fff;
      border-color: var(--success);
    }
    .btn-success:hover:not(:disabled) { background: #15803d; }

    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-lg { padding: 13px 30px; font-size: 1rem; border-radius: 8px; }
    .btn-sm { padding: 7px 14px; font-size: 0.82rem; }

    /* ── Home page ────────────────────────────────────────────── */
    #page-home { display: flex; flex-direction: column; gap: 28px; }

    .home-hero {
      text-align: center;
      padding: 40px 24px 32px;
    }
    .home-hero .badge {
      display: inline-block;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 99px;
      margin-bottom: 16px;
    }
    .home-hero h1 { margin-bottom: 10px; }
    .home-hero p  { color: var(--text-muted); font-size: 0.95rem; }

    .section-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* ── Quiz list ────────────────────────────────────────────── */
    #quiz-list {
      display: grid;
      gap: 12px;
    }

    .quiz-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 22px;
      cursor: pointer;
      transition: all var(--transition);
      text-align: left;
    }
    .quiz-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
      transform: translateY(-1px);
    }
    .quiz-card:active { transform: translateY(0); }

    .quiz-card-icon {
      width: 44px; height: 44px;
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      font-weight: 800;
      flex-shrink: 0;
    }

    .quiz-card-info { flex: 1; min-width: 0; }
    .quiz-card-info h3 {
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .quiz-card-info span {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .quiz-card-arrow {
      color: var(--text-muted);
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .loading-state {
      text-align: center;
      padding: 40px 0;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Folder browser ───────────────────────────────────────── */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 0 14px;
      flex-wrap: wrap;
    }

    .breadcrumb-item {
      background: none;
      border: none;
      font-size: 0.83rem;
      font-weight: 600;
      color: var(--accent);
      cursor: pointer;
      padding: 3px 6px;
      border-radius: var(--radius-sm);
      transition: all var(--transition);
      font-family: var(--font);
    }
    .breadcrumb-item:hover { background: var(--accent-light); }
    .breadcrumb-item.active {
      color: var(--text);
      cursor: default;
      pointer-events: none;
    }
    .breadcrumb-sep {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1;
      user-select: none;
    }

    .browser-items { display: grid; gap: 10px; }

    .browser-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      cursor: pointer;
      transition: all var(--transition);
      text-align: left;
      width: 100%;
      font-family: var(--font);
      color: var(--text);
    }
    .browser-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
      transform: translateY(-1px);
    }
    .browser-card:active { transform: translateY(0); }
    .browser-card:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }
    .browser-card-icon {
      font-size: 1.5rem;
      flex-shrink: 0;
      line-height: 1;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-light);
      border-radius: 10px;
    }
    .browser-card-info { flex: 1; min-width: 0; }
    .browser-card-info h3 {
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin: 0 0 2px;
    }
    .browser-card-info span { font-size: 0.8rem; color: var(--text-muted); }
    .browser-card-arrow { color: var(--text-muted); font-size: 1.1rem; flex-shrink: 0; }

    .mini-spinner {
      width: 22px; height: 22px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    /* ── Quiz page ────────────────────────────────────────────── */
    #page-quiz { display: flex; flex-direction: column; gap: 20px; }

    .quiz-header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 24px;
      box-shadow: var(--shadow);
    }

    .quiz-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .quiz-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .quiz-counter {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--accent);
      background: var(--accent-light);
      padding: 3px 10px;
      border-radius: 99px;
    }

    /* Progress bar */
    .progress-wrap {
      background: var(--border);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #7c3aed);
      border-radius: 99px;
      transition: width 0.4s cubic-bezier(.4,0,.2,1);
    }

    /* ── Dot navigation ───────────────────────────────────────── */
    .dot-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 14px;
    }

    .dot {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
      flex-shrink: 0;
    }
    .dot:hover   { border-color: var(--accent); color: var(--accent); }
    .dot.active  { background: var(--accent); border-color: var(--accent); color: #fff; }
    .dot.answered{ border-color: #6366f1; background: #ede9fe; color: #6366f1; }
    .dot.correct { border-color: var(--success); background: var(--success-bg); color: var(--success); }
    .dot.wrong   { border-color: var(--danger); background: var(--danger-bg); color: var(--danger); }

    /* ── Question card ────────────────────────────────────────── */
    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow-card);
      min-height: 360px;
      display: flex;
      flex-direction: column;
    }

    .question-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .question-text {
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.55;
      margin-bottom: 8px;
      flex-shrink: 0;
    }

    .question-hint {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 24px;
    }
    .question-hint em { color: var(--warning); font-style: normal; font-weight: 600; }

    /* ── Options ──────────────────────────────────────────────── */
    .options { display: flex; flex-direction: column; gap: 10px; flex: 1; }

    .option-label {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 17px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      cursor: pointer;
      transition: all var(--transition);
      user-select: none;
      position: relative;
      background: var(--surface);
    }
    .option-label:hover:not(.locked) {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .option-label input[type="checkbox"] { display: none; }

    .option-checkbox {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all var(--transition);
      background: var(--surface);
    }
    .option-checkbox::after {
      content: '';
      display: none;
      width: 10px; height: 10px;
      background: #fff;
      clip-path: polygon(14% 44%,0 65%,50% 100%,100% 16%,80% 0%,43% 62%);
    }

    .option-label input:checked + .option-checkbox {
      background: var(--accent);
      border-color: var(--accent);
    }
    .option-label input:checked + .option-checkbox::after { display: block; }

    .option-text {
      font-size: 0.93rem;
      line-height: 1.4;
      flex: 1;
    }

    .option-badge {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
      display: none;
      flex-shrink: 0;
    }

    /* Validation states */
    .option-label.locked { cursor: default; pointer-events: none; }

    .option-label.result-correct {
      border-color: var(--success-border);
      background: var(--success-bg);
    }
    .option-label.result-correct .option-checkbox {
      background: var(--success);
      border-color: var(--success);
    }
    .option-label.result-correct .option-checkbox::after { display: block; }
    .option-label.result-correct .option-badge {
      display: inline-block;
      background: var(--success);
      color: #fff;
    }

    .option-label.result-wrong {
      border-color: var(--danger-border);
      background: var(--danger-bg);
    }
    .option-label.result-wrong .option-checkbox {
      background: var(--danger);
      border-color: var(--danger);
    }
    .option-label.result-wrong .option-checkbox::after {
      display: block;
      clip-path: polygon(20% 0%, 0% 20%, 30% 50%, 0% 80%, 20% 100%, 50% 70%, 80% 100%, 100% 80%, 70% 50%, 100% 20%, 80% 0%, 50% 30%);
    }
    .option-label.result-wrong .option-badge {
      display: inline-block;
      background: var(--danger);
      color: #fff;
    }

    .option-label.result-missed {
      border-color: var(--warning);
      background: var(--warning-bg);
    }
    .option-label.result-missed .option-badge {
      display: inline-block;
      background: var(--warning);
      color: #fff;
    }

    /* ── Feedback banner ──────────────────────────────────────── */
    .feedback-banner {
      display: none;
      flex-direction: column;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      margin-top: 16px;
    }
    .feedback-banner-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .feedback-banner.show { display: flex; }
    .feedback-banner.correct {
      background: var(--success-bg);
      color: var(--success);
      border: 1px solid var(--success-border);
    }
    .feedback-banner.partial {
      background: var(--warning-bg);
      color: var(--warning);
      border: 1px solid #fcd34d;
    }
    .feedback-banner.incorrect {
      background: var(--danger-bg);
      color: var(--danger);
      border: 1px solid var(--danger-border);
    }
    .feedback-icon { font-size: 1.1rem; flex-shrink: 0; }

    .explanations-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
      padding-top: 12px;
      border-top: 1px solid currentColor;
      opacity: 0.9;
    }
    .explanation-item {
      font-size: 0.82rem;
      font-weight: 500;
      line-height: 1.5;
      padding: 0;
    }
    .explanation-label {
      font-weight: 700;
      margin-bottom: 2px;
    }

    /* ── Bottom action bar ────────────────────────────────────── */
    .action-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      box-shadow: var(--shadow);
    }

    .action-bar-left, .action-bar-right {
      display: flex;
      gap: 8px;
    }

    .action-bar-center {
      font-size: 0.82rem;
      color: var(--text-muted);
      text-align: center;
    }

    /* ── Results page ─────────────────────────────────────────── */
    #page-results { display: flex; flex-direction: column; gap: 24px; }

    .results-hero {
      text-align: center;
      padding: 32px 24px;
    }

    .score-ring-wrap {
      position: relative;
      width: 140px; height: 140px;
      margin: 0 auto 20px;
    }

    .score-ring {
      transform: rotate(-90deg);
      width: 140px; height: 140px;
    }

    .score-ring-bg { fill: none; stroke: var(--border); stroke-width: 10; }
    .score-ring-fg {
      fill: none;
      stroke: var(--accent);
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s cubic-bezier(.4,0,.2,1);
    }
    .score-ring-fg.great  { stroke: var(--success); }
    .score-ring-fg.ok     { stroke: var(--warning); }
    .score-ring-fg.poor   { stroke: var(--danger); }

    .score-center {
      position: absolute;
      inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .score-center .pct {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
    }
    .score-center .pct-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    .results-hero h2 { margin-bottom: 6px; }
    .results-hero p  { color: var(--text-muted); font-size: 0.9rem; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stat-box {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 14px;
      text-align: center;
    }
    .stat-box .stat-num {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .stat-box .stat-lbl {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-weight: 600;
    }
    .stat-box.s-correct .stat-num { color: var(--success); }
    .stat-box.s-wrong   .stat-num { color: var(--danger); }
    .stat-box.s-skipped .stat-num { color: var(--warning); }

    .results-review-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .review-list { display: flex; flex-direction: column; gap: 10px; }

    .review-item {
      border: 1.5px solid var(--border);
      border-radius: 9px;
      overflow: hidden;
    }
    .review-item-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--surface-alt);
      cursor: pointer;
      user-select: none;
    }
    .review-item-header:hover { background: #f2f4f7; }
    .review-status {
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .review-status.correct { background: var(--success-bg); color: var(--success); }
    .review-status.wrong   { background: var(--danger-bg);  color: var(--danger); }
    .review-status.skipped { background: var(--warning-bg); color: var(--warning); }
    .review-q-text { font-size: 0.88rem; font-weight: 500; flex: 1; }
    .review-chevron { color: var(--text-muted); font-size: 0.9rem; transition: transform var(--transition); }
    .review-item.open .review-chevron { transform: rotate(180deg); }

    .review-detail {
      display: none;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .review-item.open .review-detail { display: block; }

    .review-option {
      font-size: 0.83rem;
      padding: 6px 10px;
      border-radius: 5px;
      margin-bottom: 5px;
      display: flex; align-items: center; gap: 8px;
    }
    .review-option .r-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .review-option.ro-correct { color: var(--success); background: var(--success-bg); }
    .review-option.ro-correct .r-dot { background: var(--success); }
    .review-option.ro-wrong   { color: var(--danger);  background: var(--danger-bg); }
    .review-option.ro-wrong   .r-dot { background: var(--danger); }
    .review-option.ro-missed  { color: var(--warning); background: var(--warning-bg); }
    .review-option.ro-missed  .r-dot { background: var(--warning); }
    .review-option.ro-neutral { color: var(--text-muted); }

    .results-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* ── Hidden helper ────────────────────────────────────────── */
    .hidden { display: none !important; }

    /* ── Responsive ───────────────────────────────────────────── */
    @media (max-width: 600px) {
      .card, .question-card { padding: 20px; }
      .action-bar { flex-wrap: wrap; }
      .stats-row { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .home-hero { padding: 24px 16px 20px; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- SITE HEADER                                                 -->
<!-- ═══════════════════════════════════════════════════════════ -->
<header class="site-header">
  <div class="logo">Quiz<span>App</span></div>
  <button class="header-home-btn hidden" id="btn-header-home">← Zurück zur Übersicht</button>
</header>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- APP CONTENT                                                 -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div class="app">

  <!-- ── HOME PAGE ─────────────────────────────────────────── -->
  <div id="page-home">
    <div class="card home-hero">
      <div class="badge">FFHS · Quiz Engine</div>

      <p>Wähle ein Themengebiet und teste dein Wissen mit Multiple-Choice-Fragen.</p>
    </div>

    <!-- Folder browser -->
    <div class="card" id="folder-browser-section">

      <!-- Loading state -->

      <!-- Error state -->

      <!-- Browser content -->
      <div id="browser-content" class="hidden">

  <div id="page-quiz" class="hidden">
    <!-- Header strip -->
    <div class="quiz-header">
      <div class="quiz-meta">
        <div class="quiz-title" id="quiz-chapter-title">–</div>
        <div class="quiz-counter" id="quiz-counter">1 / 30</div>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar" style="width:0%"></div>
      </div>
      <div class="dot-nav" id="dot-nav"></div>
    </div>

    <!-- Question card -->
    <div class="question-card" id="question-card">
      <div class="question-label">Frage <span id="q-num">1</span></div>
      <div class="question-text" id="q-text"></div>
      <div class="question-hint" id="q-hint"></div>
      <div class="options" id="q-options"></div>
      <div class="feedback-banner" id="q-feedback">
        <div class="feedback-banner-header">
          <span class="feedback-icon"></span>

    <!-- Action bar -->
    <div class="action-bar">
      <div class="action-bar-left">

      </div>
      <div class="action-bar-center" id="action-hint"></div>
      <div class="action-bar-right">
        <button class="btn btn-primary" id="btn-check">Antwort prüfen</button>

      </div>

  <!-- ── RESULTS PAGE ───────────────────────────────────────── -->
  <div id="page-results" class="hidden">
    <div class="card results-hero">
      <div class="score-ring-wrap">

          <circle class="score-ring-bg" cx="70" cy="70" r="58"/>
          <circle class="score-ring-fg" id="score-ring-fg" cx="70" cy="70" r="58"
                  stroke-dasharray="364.4"
                  stroke-dashoffset="364.4"/>
        </svg>

          <div class="pct" id="score-pct">0%</div>
          <div class="pct-label">Score</div>
        </div>
      </div>

    <div class="card">
      <div class="stats-row">
        <div class="stat-box s-correct">
          <div class="stat-num" id="stat-correct">0</div>
          <div class="stat-lbl">Richtig</div>
        </div>
        <div class="stat-box s-wrong">
          <div class="stat-num" id="stat-wrong">0</div>
          <div class="stat-lbl">Falsch</div>
        </div>
        <div class="stat-box s-skipped">
          <div class="stat-num" id="stat-skipped">0</div>
          <div class="stat-lbl">Übersprungen</div>
        </div>
      </div>

    <div class="card">
      <div class="results-review-title">Detailauswertung</div>
      <div class="review-list" id="review-list"></div>
    </div>

      <button class="btn btn-secondary btn-lg" id="btn-retry">Quiz wiederholen</button>
      <button class="btn btn-primary btn-lg" id="btn-back-home">Zur Übersicht</button>
    </div>
  </div>

</div><!-- /app -->

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════ */
const manifestCache  = {};    // keyed by folderPath.join('/'), each entry is items array
let folderPath       = [];    // current navigation path (array of folder names)
let availableQuizzes = [];    // [{ file, chapter, questionCount, data }]
let currentQuiz      = null;  // active quiz data
let currentIndex     = 0;     // current question index (0-based)
let userAnswers      = [];    // Set[] of selected option indices per question
let checkedState     = [];    // 'unanswered' | 'correct' | 'partial' | 'wrong' per question

/* ═══════════════════════════════════════════════════════════════
   DOM REFS
═══════════════════════════════════════════════════════════════ */
const pageHome      = document.getElementById('page-home');
const pageQuiz      = document.getElementById('page-quiz');
const pageResults   = document.getElementById('page-results');
const btnHeaderHome = document.getElementById('btn-header-home');

/* ═══════════════════════════════════════════════════════════════
   SCHEMA VALIDATOR
   Returns null if valid, or a string describing the first error.
═══════════════════════════════════════════════════════════════ */
function validateQuizData(data) {
  if (!data || typeof data !== 'object')          return 'Root is not an object';
  if (typeof data.chapter !== 'string' || !data.chapter.trim())
                                                   return 'Missing or empty "chapter" string';
  if (!Array.isArray(data.questions) || data.questions.length === 0)
                                                   return '"questions" must be a non-empty array';
  for (let i = 0; i < data.questions.length; i++) {
    const q = data.questions[i];
    if (typeof q.question !== 'string' || !q.question.trim())
      return `Question ${i + 1}: missing "question" string`;
    if (!Array.isArray(q.options) || q.options.length < 2)
      return `Question ${i + 1}: "options" must be an array with ≥ 2 entries`;
    if (!q.options.every(o => typeof o === 'string'))
      return `Question ${i + 1}: all "options" entries must be strings`;
    if (!Array.isArray(q.correct_answers) || q.correct_answers.length === 0)
      return `Question ${i + 1}: "correct_answers" must be a non-empty array`;
    if (!q.correct_answers.every(n => Number.isInteger(n) && n >= 0 && n < q.options.length))
      return `Question ${i + 1}: "correct_answers" contains invalid option index`;
    if (q.explanations !== undefined) {
      if (typeof q.explanations !== 'object' || q.explanations === null || Array.isArray(q.explanations))
        return `Question ${i + 1}: "explanations" must be an object`;
      for (const [key, val] of Object.entries(q.explanations)) {
        if (typeof val !== 'string')
          return `Question ${i + 1}: explanation for option "${key}" must be a string`;
      }
    }
  }
  return null; // valid
}

/* ═══════════════════════════════════════════════════════════════
   MANIFEST LOADING  –  each folder has its own manifest.json,
   fetched on demand and cached. Format for every manifest.json:
   [
     { "type": "folder", "name": "Folder Name" },
     { "type": "file",   "name": "quiz_file.json" }
   ]
═══════════════════════════════════════════════════════════════ */
function manifestUrl(path) {
  return path.length
    ? `questions/${path.join('/')}/manifest.json`
    : 'questions/manifest.json';
}

async function fetchManifest(path) {
  const key = path.join('/');
  if (manifestCache[key] !== undefined) return manifestCache[key];
  const url = manifestUrl(path);
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status} (${url})`);
  const items = await resp.json();
  manifestCache[key] = items;
  return items;
}

async function navigateTo(path) {
  folderPath = path;
  const key = path.join('/');
  if (manifestCache[key] === undefined) {
    document.getElementById('browser-loading').classList.remove('hidden');
    document.getElementById('browser-content').classList.add('hidden');
    document.getElementById('browser-error').classList.add('hidden');
  }
  try {
    const items = await fetchManifest(path);
    showBrowserContent(items);
  } catch (err) {
    document.getElementById('browser-loading').classList.add('hidden');
    document.getElementById('browser-error').classList.remove('hidden');
    document.getElementById('browser-error-msg').textContent =
      `Manifest konnte nicht geladen werden: ${err.message}`;
  }
}

/* ═══════════════════════════════════════════════════════════════
   FOLDER BROWSER
═══════════════════════════════════════════════════════════════ */
function showBrowserContent(items) {
  document.getElementById('browser-loading').classList.add('hidden');
  document.getElementById('browser-error').classList.add('hidden');
  document.getElementById('browser-content').classList.remove('hidden');
  renderBreadcrumb();
  renderBrowserItems(items);
}

function renderBreadcrumb() {
  const el = document.getElementById('breadcrumb');
  el.innerHTML = '';
  const parts = ['Alle Fächer', ...folderPath];
  parts.forEach((part, i) => {
    if (i > 0) {
      const sep = document.createElement('span');
      sep.className = 'breadcrumb-sep';
      sep.textContent = '›';
      el.appendChild(sep);
    }
    const btn = document.createElement('button');
    btn.className = 'breadcrumb-item' + (i === parts.length - 1 ? ' active' : '');
    btn.textContent = part;
    const depth = i; // capture for closure
    btn.addEventListener('click', () => navigateTo(folderPath.slice(0, depth)));
    el.appendChild(btn);
  });
}

function renderBrowserItems(items) {
  const container = document.getElementById('browser-items');
  container.innerHTML = '';

  // Sort: folders first, then files; alphabetical within each group
  const sorted = [...items].sort((a, b) => {
    if (a.type !== b.type) return a.type === 'folder' ? -1 : 1;
    return a.name.localeCompare(b.name, 'de', { sensitivity: 'base' });
  });

  if (sorted.length === 0) {
    container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:16px 0">Keine Einträge gefunden.</p>';
    return;
  }

  for (const item of sorted) {
    const btn = document.createElement('button');
    btn.className = 'browser-card';

    if (item.type === 'folder') {
      btn.innerHTML = `
        <div class="browser-card-icon">📁</div>
        <div class="browser-card-info">
          <h3>${escHtml(item.name)}</h3>
          <span>Ordner öffnen</span>
        </div>
        <div class="browser-card-arrow">›</div>
      `;
      btn.addEventListener('click', () => navigateTo([...folderPath, item.name]));
    } else {
      const displayName = item.name.replace(/\.json$/i, '').replace(/_/g, ' ');
      btn.innerHTML = `
        <div class="browser-card-icon">📄</div>
        <div class="browser-card-info">
          <h3>${escHtml(displayName)}</h3>
          <span>Klicken zum Starten</span>
        </div>
        <div class="browser-card-arrow">›</div>
      `;
      const filePath = `questions/${[...folderPath, item.name].join('/')}`;
      btn.addEventListener('click', () => loadAndStartQuiz(filePath, btn));
    }
    container.appendChild(btn);
  }
}

async function loadAndStartQuiz(path, btn) {
  btn.disabled = true;
  const prevHTML = btn.innerHTML;
  btn.innerHTML = '<div class="mini-spinner"></div>';
  try {
    const resp = await fetch(path);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    const err = validateQuizData(data);
    if (err) throw new Error(`Schema: ${err}`);
    availableQuizzes = [{
      file: path.split('/').pop(),
      chapter: data.chapter,
      questionCount: data.questions.length,
      data,
    }];
    startQuiz(0);
  } catch (err) {
    btn.innerHTML = prevHTML;
    btn.disabled = false;
    alert(`Fehler beim Laden von "${path}":\n${err.message}`);
  }
}

/* ═══════════════════════════════════════════════════════════════
   CHAPTER NUMBER EXTRACTION
   Tries filename first (ds_2_architectures.json → "2"),
   then falls back to chapter title ("Chapter 2:" → "2").
═══════════════════════════════════════════════════════════════ */
function chapterNum(filename, chapter) {
  const mf = filename.match(/^ds_(\d+)_/);
  if (mf) return mf[1];
  const mc = (chapter || '').match(/Chapter\s+(\d+)/i);
  return mc ? mc[1] : '?';
}

/* ═══════════════════════════════════════════════════════════════
   NAVIGATION HELPERS
═══════════════════════════════════════════════════════════════ */
function showPage(page) {
  pageHome.classList.add('hidden');
  pageQuiz.classList.add('hidden');
  pageResults.classList.add('hidden');
  page.classList.remove('hidden');
  btnHeaderHome.classList.toggle('hidden', page === pageHome);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showHome() {
  showPage(pageHome);
  navigateTo(folderPath);
}

/* ═══════════════════════════════════════════════════════════════
   QUIZ LOGIC
═══════════════════════════════════════════════════════════════ */
function startQuiz(quizIndex) {
  currentQuiz = availableQuizzes[quizIndex].data;
  currentIndex = 0;

  const n = currentQuiz.questions.length;
  userAnswers  = Array.from({ length: n }, () => new Set());
  checkedState = Array(n).fill('unanswered');

  document.getElementById('quiz-chapter-title').textContent = currentQuiz.chapter;
  buildDotNav();
  renderQuestion(0);
  showPage(pageQuiz);
}

function buildDotNav() {
  const container = document.getElementById('dot-nav');
  container.innerHTML = '';
  currentQuiz.questions.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'dot';
    dot.textContent = i + 1;
    dot.title = `Frage ${i + 1}`;
    dot.addEventListener('click', () => {
      if (checkedState[currentIndex] === 'unanswered' && userAnswers[currentIndex].size > 0) {
        // soft-save answers before navigating away without checking
      }
      renderQuestion(i);
    });
    container.appendChild(dot);
  });
}

function renderQuestion(index) {
  currentIndex = index;
  const q = currentQuiz.questions[index];
  const n = currentQuiz.questions.length;
  const answered = checkedState[index] !== 'unanswered';

  // Meta
  document.getElementById('q-num').textContent = index + 1;
  document.getElementById('q-text').textContent = q.question;
  document.getElementById('quiz-counter').textContent = `${index + 1} / ${n}`;

  // Hint – only revealed after validation
  const correctCount = q.correct_answers.length;
  const hintEl = document.getElementById('q-hint');
  if (answered) {
    hintEl.innerHTML = correctCount === 1
      ? 'Richtige Antworten: <em>1</em>'
      : `Richtige Antworten: <em>${correctCount}</em>`;
  } else {
    hintEl.innerHTML = '';
  }

  // Progress
  const checkedCount = checkedState.filter(s => s !== 'unanswered').length;
  document.getElementById('progress-bar').style.width = `${(checkedCount / n) * 100}%`;

  // Dots
  document.querySelectorAll('.dot').forEach((dot, i) => {
    dot.className = 'dot';
    if (i === index) dot.classList.add('active');
    if (checkedState[i] === 'correct')  dot.classList.add('correct');
    else if (checkedState[i] === 'partial' || checkedState[i] === 'wrong') dot.classList.add('wrong');
    else if (userAnswers[i].size > 0)   dot.classList.add('answered');
  });

  // Options
  const optContainer = document.getElementById('q-options');
  optContainer.innerHTML = '';
  q.options.forEach((optText, optIdx) => {
    const label = document.createElement('label');
    label.className = 'option-label';
    if (answered) label.classList.add('locked');

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = userAnswers[index].has(optIdx);
    cb.addEventListener('change', () => {
      if (cb.checked) userAnswers[index].add(optIdx);
      else            userAnswers[index].delete(optIdx);
      updateActionBar();
    });

    const box = document.createElement('div');
    box.className = 'option-checkbox';

    const text = document.createElement('span');
    text.className = 'option-text';
    text.textContent = optText;

    const badge = document.createElement('span');
    badge.className = 'option-badge';

    // Apply validation styling if already checked
    if (answered) {
      const isCorrectOption  = q.correct_answers.includes(optIdx);
      const isSelectedOption = userAnswers[index].has(optIdx);

      if (isSelectedOption && isCorrectOption) {
        label.classList.add('result-correct');
        badge.textContent = '✓ Richtig';
      } else if (isSelectedOption && !isCorrectOption) {
        label.classList.add('result-wrong');
        badge.textContent = '✗ Falsch';
      } else if (!isSelectedOption && isCorrectOption) {
        label.classList.add('result-missed');
        badge.textContent = '! Vergessen';
      }
    }

    label.append(cb, box, text, badge);
    optContainer.appendChild(label);
  });

  // Feedback banner
  const fb = document.getElementById('q-feedback');
  fb.className = 'feedback-banner';
  const explContainer = document.getElementById('q-explanations');
  explContainer.innerHTML = '';
  
  if (answered) {
    const icon = fb.querySelector('.feedback-icon');
    const msg  = fb.querySelector('.feedback-msg');
    fb.classList.add('show');
    if (checkedState[index] === 'correct') {
      fb.classList.add('correct');
      icon.textContent = '✓';
      msg.textContent  = 'Alle Antworten korrekt!';
    } else if (checkedState[index] === 'partial') {
      fb.classList.add('partial');
      icon.textContent = '◑';
      msg.textContent  = 'Teilweise richtig – nicht alle richtigen Antworten wurden ausgewählt.';
    } else {
      fb.classList.add('incorrect');
      icon.textContent = '✗';
      msg.textContent  = 'Leider falsch. Sieh dir die richtigen Antworten an.';
    }

    // Display explanations if available
    if (q.explanations && typeof q.explanations === 'object') {
      for (const optIdx of q.correct_answers) {
        const optIdxStr = String(optIdx);
        if (q.explanations[optIdxStr]) {
          const explItem = document.createElement('div');
          explItem.className = 'explanation-item';
          explItem.innerHTML = `
            <div class="explanation-label">Option ${optIdx + 1}:</div>
            <div>${escHtml(q.explanations[optIdxStr])}</div>
          `;
          explContainer.appendChild(explItem);
        }
      }
    }
  }

  updateActionBar();
}

function updateActionBar() {
  const index  = currentIndex;
  const n      = currentQuiz.questions.length;
  const answered = checkedState[index] !== 'unanswered';
  const hasSelection = userAnswers[index].size > 0;
  const isLast = index === n - 1;

  const btnPrev   = document.getElementById('btn-prev');
  const btnCheck  = document.getElementById('btn-check');
  const btnNext   = document.getElementById('btn-next');
  const btnFinish = document.getElementById('btn-finish');
  const hint      = document.getElementById('action-hint');

  btnPrev.disabled = index === 0;

  if (!answered) {
    btnCheck.classList.remove('hidden');
    btnNext.classList.add('hidden');
    btnFinish.classList.add('hidden');
    btnCheck.disabled = !hasSelection;
    hint.textContent = hasSelection ? '' : 'Wähle mindestens eine Antwort.';
  } else {
    btnCheck.classList.add('hidden');
    if (isLast) {
      btnNext.classList.add('hidden');
      btnFinish.classList.remove('hidden');
    } else {
      btnNext.classList.remove('hidden');
      btnFinish.classList.add('hidden');
    }
    hint.textContent = '';
  }
}

function checkAnswer() {
  const index = currentIndex;
  const q = currentQuiz.questions[index];
  const selected = userAnswers[index];
  const correct  = new Set(q.correct_answers);

  const allCorrectSelected = q.correct_answers.every(c => selected.has(c));
  const noWrongSelected    = [...selected].every(s => correct.has(s));

  if (allCorrectSelected && noWrongSelected) {
    checkedState[index] = 'correct';
  } else if ([...selected].some(s => correct.has(s))) {
    checkedState[index] = 'partial';
  } else {
    checkedState[index] = 'wrong';
  }

  renderQuestion(index);
}

/* ═══════════════════════════════════════════════════════════════
   RESULTS PAGE
═══════════════════════════════════════════════════════════════ */
function showResults() {
  const n = currentQuiz.questions.length;
  let correct  = 0, wrong = 0, skipped = 0;

  checkedState.forEach((s, i) => {
    if      (s === 'correct')                       correct++;
    else if (s === 'partial' || s === 'wrong')      wrong++;
    else                                             skipped++;
  });

  const pct = Math.round((correct / n) * 100);

  // Ring animation
  const circumference = 364.4;
  const offset = circumference - (pct / 100) * circumference;
  const ring = document.getElementById('score-ring-fg');
  ring.style.strokeDashoffset = circumference;
  ring.className = 'score-ring-fg';
  if (pct >= 80)      ring.classList.add('great');
  else if (pct >= 50) ring.classList.add('ok');
  else                ring.classList.add('poor');
  setTimeout(() => { ring.style.strokeDashoffset = offset; }, 80);

  document.getElementById('score-pct').textContent = pct + '%';

  // Headline
  let title, subtitle;
  if (pct === 100)      { title = 'Perfekt! 🎉'; subtitle = 'Alle Fragen richtig beantwortet!'; }
  else if (pct >= 80)   { title = 'Sehr gut!';   subtitle = 'Du beherrschst das Thema gut.'; }
  else if (pct >= 60)   { title = 'Gut gemacht'; subtitle = 'Noch etwas Übung und du hast es!'; }
  else if (pct >= 40)   { title = 'Ausbaufähig'; subtitle = 'Nochmal lesen und dann wiederholen.'; }
  else                  { title = 'Viel zu tun'; subtitle = 'Lies das Kapitel nochmal durch.'; }

  document.getElementById('results-title').textContent = title;
  document.getElementById('results-subtitle').textContent = subtitle;
  document.getElementById('stat-correct').textContent  = correct;
  document.getElementById('stat-wrong').textContent    = wrong;
  document.getElementById('stat-skipped').textContent  = skipped;

  // Review list
  const reviewList = document.getElementById('review-list');
  reviewList.innerHTML = '';
  currentQuiz.questions.forEach((q, i) => {
    const state = checkedState[i];
    const statusClass = state === 'correct' ? 'correct' : (state === 'unanswered' ? 'skipped' : 'wrong');
    const statusMark  = state === 'correct' ? '✓' : (state === 'unanswered' ? '–' : '✗');

    const item = document.createElement('div');
    item.className = 'review-item';
    item.innerHTML = `
      <div class="review-item-header">
        <div class="review-status ${statusClass}">${statusMark}</div>
        <div class="review-q-text">${escHtml(q.question)}</div>
        <div class="review-chevron">▾</div>
      </div>
      <div class="review-detail"></div>
    `;

    const detail = item.querySelector('.review-detail');
    const selected = userAnswers[i];
    const correct  = new Set(q.correct_answers);

    q.options.forEach((opt, oi) => {
      const isCorrect  = correct.has(oi);
      const isSelected = selected.has(oi);
      let cls = 'ro-neutral', dot = '';
      if      (isSelected && isCorrect)           cls = 'ro-correct';
      else if (isSelected && !isCorrect)           cls = 'ro-wrong';
      else if (!isSelected && isCorrect)           cls = 'ro-missed';
      const div = document.createElement('div');
      div.className = `review-option ${cls}`;
      div.innerHTML = `<div class="r-dot"></div>${escHtml(opt)}`;
      detail.appendChild(div);
    });

    item.querySelector('.review-item-header').addEventListener('click', () => {
      item.classList.toggle('open');
    });

    reviewList.appendChild(item);
  });

  showPage(pageResults);
}

/* ═══════════════════════════════════════════════════════════════
   UTILITY
═══════════════════════════════════════════════════════════════ */
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════════════════════════
   EVENT LISTENERS
═══════════════════════════════════════════════════════════════ */
btnHeaderHome.addEventListener('click', showHome);

document.getElementById('btn-prev').addEventListener('click', () => {
  if (currentIndex > 0) renderQuestion(currentIndex - 1);
});

document.getElementById('btn-next').addEventListener('click', () => {
  if (currentIndex < currentQuiz.questions.length - 1) renderQuestion(currentIndex + 1);
});

document.getElementById('btn-check').addEventListener('click', checkAnswer);

document.getElementById('btn-finish').addEventListener('click', () => {
  // Auto-check any remaining unchecked questions with selections
  for (let i = 0; i < currentQuiz.questions.length; i++) {
    if (checkedState[i] === 'unanswered') {
      const q = currentQuiz.questions[i];
      const selected = userAnswers[i];
      if (selected.size > 0) {
        const correct = new Set(q.correct_answers);
        const allOk = q.correct_answers.every(c => selected.has(c));
        const noWrong = [...selected].every(s => correct.has(s));
        checkedState[i] = (allOk && noWrong) ? 'correct' : ([...selected].some(s => correct.has(s)) ? 'partial' : 'wrong');
      }
    }
  }
  showResults();
});

document.getElementById('btn-retry').addEventListener('click', () => {
  const idx = availableQuizzes.findIndex(q => q.data === currentQuiz);
  startQuiz(idx >= 0 ? idx : 0);
});

document.getElementById('btn-back-home').addEventListener('click', showHome);

/* ═══════════════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════════════ */
navigateTo([]);</script>
